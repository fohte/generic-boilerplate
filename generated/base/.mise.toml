[tools]
lefthook = "2.1.4"

# lefthook hooks
actionlint = "1.7.12"
node = "24.14.1"
pinact = "3.9.0"
"github:fohte/basefmt" = "0.1.0"
# When no node project is present in the repo, prettier and commitlint are
# provided via mise since there is no package.json to host them.
"npm:@commitlint/cli" = "20.5.0"
"npm:prettier" = "3.8.1"
shellcheck = "0.11.0"
shfmt = "3.13.0"

name: Sync Generated to Template

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  sync:
    # Only run on Renovate PRs that change generated/ files
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Fetch base branch
        run: git fetch origin "$BASE_REF" --depth=1
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}

      - name: Apply Renovate changes to template/
        id: sync
        run: |
          if scripts/apply-renovate-patch "origin/$BASE_REF"; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}

      # ========================================
      # Verify sync completeness
      # ========================================
      - name: Verify sync completeness
        if: steps.sync.outputs.success == 'true'
        run: scripts/verify-sync-completeness

      # ========================================
      # Commit changes
      # ========================================
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_patches=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patches=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes to PR branch
        if: steps.changes.outputs.has_patches == 'true' && steps.sync.outputs.success == 'true'
        uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          commit_message: 'chore(template): sync changes from generated/'
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Fail if manual updates required
        if: steps.sync.outputs.success == 'false'
        run: |
          echo "::error::Some files require manual update. Check the logs above for details."
          exit 1

  # this job is used for branch protection rule
  sync-status:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

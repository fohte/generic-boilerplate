name: Sync Generated to Template

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write

jobs:
  sync:
    # Only run on Renovate PRs that change generated/ files
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: generic-boilerplate-sync-generated-to-template
          domain: octo-sts.fohte.net

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Fetch base branch
        run: git fetch origin "$BASE_REF" --depth=1
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}

      - name: Apply Renovate changes to template/
        id: sync
        run: |
          if scripts/apply-renovate-patch "origin/$BASE_REF"; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}

      # ========================================
      # Verify sync completeness
      # ========================================
      - name: Verify sync completeness
        if: steps.sync.outputs.success == 'true'
        run: scripts/verify-sync-completeness

      # ========================================
      # Commit changes
      # ========================================
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_patches=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patches=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes to PR branch
        if: steps.changes.outputs.has_patches == 'true' && steps.sync.outputs.success == 'true'
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: 'chore(template): sync changes from generated/'
          github_token: ${{ steps.octo-sts.outputs.token }}

      - name: Fail if manual updates required
        if: steps.sync.outputs.success == 'false'
        run: |
          echo "::error::Some files require manual update. Check the logs above for details."
          exit 1

  # this job is used for branch protection rule
  sync-status:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

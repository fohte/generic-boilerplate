name: Validate Template

on:
  push:
    # Skip tag pushes: the octo-sts trust policy only allows branch refs, so
    # token issuance for tag refs returns 403. The tagged commit has already
    # been validated on its branch, so re-running on the tag is redundant.
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write

jobs:
  list-fixtures:
    runs-on: ubuntu-latest
    # Skip for Renovate bot commits.
    # Renovate updates generated/ files, which triggers sync-generated-to-template.yml
    # to sync changes to template/. If we run regenerate here on Renovate's commit,
    # we may use stale template/ (before sync completes), causing incorrect regeneration.
    # By skipping here, we let sync finish first, then validate runs on sync's commit.
    if: github.actor != 'renovate[bot]'
    outputs:
      fixtures: ${{ steps.list.outputs.fixtures }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: List fixtures
        id: list
        run: |
          fixtures=$(find tests/fixtures -name '*.yml' -exec basename {} .yml \; | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "fixtures=$fixtures" >> "$GITHUB_OUTPUT"

  regenerate-and-commit:
    runs-on: ubuntu-latest
    needs: list-fixtures
    outputs:
      node_changed: ${{ steps.check-node-changes.outputs.any_changed }}
      rust_changed: ${{ steps.check-rust-changes.outputs.any_changed }}

    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: generic-boilerplate-validate-template
          domain: octo-sts.fohte.net

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Fetch master branch
        run: git fetch origin master --depth=1

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.13

      - name: Save diff before regeneration
        id: save-diff
        run: |
          git diff origin/master -- generated/ > /tmp/before-regen.diff || true
          if [[ -s /tmp/before-regen.diff ]]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate all fixtures
        run: scripts/generate-snapshots

      - name: Check Renovate changes preserved
        if: steps.save-diff.outputs.has_diff == 'true'
        run: scripts/check-renovate-diff-preserved /tmp/before-regen.diff

      - name: Check if node template changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: check-node-changes
        with:
          base_sha: master
          files: generated/node/**

      - name: Check if rust template changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: check-rust-changes
        with:
          base_sha: master
          files: generated/rust/**

      - name: Commit changes
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: 'chore(generated): regenerate from template'
          github_token: ${{ steps.octo-sts.outputs.token }}

  validate:
    runs-on: ubuntu-latest
    needs: [list-fixtures, regenerate-and-commit]

    strategy:
      matrix:
        fixture: ${{ fromJson(needs.list-fixtures.outputs.fixtures) }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.13
          working_directory: generated/${{ matrix.fixture }}

      - name: Enable corepack
        run: corepack enable
        if: hashFiles(format('generated/{0}/**/package.json', matrix.fixture)) != ''

      - name: Generate lockfiles
        working-directory: generated/${{ matrix.fixture }}
        run: |
          # Generate Cargo.lock for Rust projects so that cargo commands
          # invoked by lefthook don't create untracked files.
          find . -name Cargo.toml -not -path '*/target/*' -print0 \
            | while IFS= read -r -d '' toml; do
                (cd "$(dirname "$toml")" && cargo generate-lockfile)
              done

      - name: Initialize git repository
        working-directory: generated/${{ matrix.fixture }}
        run: |
          git init
          git config user.email "test@example.com"
          git config user.name "Test"
          git add -A
          git commit -m "initial"

      - name: Install Node.js dependencies
        if: hashFiles(format('generated/{0}/**/package.json', matrix.fixture)) != ''
        working-directory: generated/${{ matrix.fixture }}
        run: |
          # Install dependencies so that lefthook eslint hook can find the eslint binary.
          # Find all directories containing package.json and install in each.
          find . -name package.json -not -path '*/node_modules/*' -print0 \
            | while IFS= read -r -d '' pkg; do
                dir="$(dirname "$pkg")"
                (cd "$dir" && pnpm install --no-frozen-lockfile)
              done

      - name: Run lefthook
        working-directory: generated/${{ matrix.fixture }}
        env:
          # pinact's min-age check calls the GitHub API; without a token it hits
          # the 60 req/h unauthenticated limit shared per IP and fails on CI.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: lefthook run pre-commit --all-files

      - name: Check for diff
        working-directory: generated/${{ matrix.fixture }}
        run: |
          # "Install Node.js dependencies" step generates pnpm-lock.yaml and
          # node_modules/ which are not part of the template output.
          # Exclude them so they don't cause a false diff failure.
          exclude_paths=(
            ':!pnpm-lock.yaml' ':!**/pnpm-lock.yaml'
            ':!node_modules' ':!**/node_modules'
          )
          status=$(git status --porcelain -- . "${exclude_paths[@]}")
          if [ -n "$status" ]; then
            echo "Error: Template validation failed. The following files have diffs after running lefthook:"
            echo "$status"
            git diff -- . "${exclude_paths[@]}"
            exit 1
          fi

  validate-node:
    runs-on: ubuntu-latest
    needs: regenerate-and-commit
    if: needs.regenerate-and-commit.outputs.node_changed == 'true'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.13
          working_directory: generated/node

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
            generated/node/node_modules
          key: ${{ runner.os }}-pnpm-validate-node-${{ hashFiles('generated/node/package.json') }}
          restore-keys: ${{ runner.os }}-pnpm-validate-node-

      - run: pnpm install
        working-directory: generated/node

      - name: Run tests
        working-directory: generated/node
        run: pnpm run test

  validate-rust:
    runs-on: ubuntu-latest
    needs: regenerate-and-commit
    if: needs.regenerate-and-commit.outputs.rust_changed == 'true'
    env:
      SCCACHE_GHA_ENABLED: 'true'
      RUSTC_WRAPPER: 'sccache'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}

      # Run sccache-action before mise-action so that sccache binary is
      # available when mise installs cargo tools (RUSTC_WRAPPER=sccache).
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.13
          working_directory: generated/rust

      - name: Run tests
        working-directory: generated/rust
        run: cargo test

  # this job is used for branch protection rule
  validate-status:
    runs-on: ubuntu-latest
    needs:
      - list-fixtures
      - regenerate-and-commit
      - validate
      - validate-node
      - validate-rust
    if: always()
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

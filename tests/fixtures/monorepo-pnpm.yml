# Test fixture for monorepo template with pnpm (non-workspace)
# This fixture ensures that subpackage package.json files include the
# packageManager field, which is required for apply-renovate-patch to
# sync pnpm version updates to subpackage templates.
type: base
project_name: monorepo-pnpm
description: Test monorepo project with pnpm (non-workspace)
is_public: false
use_release_please: false
use_coverage: false
node_package_manager: pnpm
monorepo_node_workspace: false
subpackages:
  - name: frontend
    type: node
  - name: backend
    type: rust

# Test fixture for a Rust root with Node subpackages: one that brings its own
# setup (tests: false) and one that uses the template's own test scaffolding,
# so both the `tests: false` opt-out and the default testable-subpackage path
# render and get validated.
type: rust
project_name: rust-with-node-subpackage
description: Test Rust root with a node docs subpackage
is_public: false
use_release_please: false
use_coverage: false
use_storybook: false
monorepo_node_workspace: false
subpackages:
  - name: docs
    type: node
    # The docs subpackage will bring its own setup (Astro/Starlight etc.).
    tests: false
  - name: cli
    type: node
repo_language: ja
